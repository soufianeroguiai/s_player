name: Build S-Player APK (Kotlin DSL Stable)

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ================= CHECKOUT =================
      - name: Checkout repository
        uses: actions/checkout@v4

      # ================= JAVA 17 (AS REQUESTED) =================
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      # ================= FLUTTER (UPDATED FOR JAVA 17 COMPAT) =================
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.27.4"   # <-- يدعم Java 17 بدون مشاكل Groovy
          channel: stable
          cache: true

      # ================= PERMISSIONS =================
      - name: Fix Gradle permissions
        run: chmod +x android/gradlew

      # ================= ACCEPT ANDROID LICENSES =================
      - name: Accept Android SDK licenses
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true

      # ================= CACHE =================
      - name: Cache pub dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            .dart_tool
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      # ================= DEPENDENCIES =================
      - name: Install dependencies
        run: flutter pub get

      # ================= DOCTOR (DEBUG) =================
      - name: Flutter doctor
        run: flutter doctor -v

      # ================= ANALYZE =================
      - name: Analyze code
        run: flutter analyze
        continue-on-error: true

      # ================= BUILD =================
      - name: Build release APK
        run: |
          flutter clean
          flutter build apk --release

      # ================= ARTIFACT =================
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: s-player-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

      # ================= VERSION =================
      - name: Get version
        id: version
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: //' | tr -d '[:space:]')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      # ================= RELEASE =================
      - name: Create GitHub Release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: S-Player v${{ steps.version.outputs.version }}
          body: |
            🎬 S-Player Stable Build (Kotlin DSL)

            ✔ Flutter 3.27.4
            ✔ Kotlin DSL Android project
            ✔ media_kit compatible
            ✔ Clean CI pipeline

            🚀 Auto-generated build
          files: build/app/outputs/flutter-apk/app-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}