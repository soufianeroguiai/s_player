Name: Build S-Player APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.3'
          channel: stable
          cache: true

      - name: Generate Android project
        run: |
          flutter create --project-name s_player --org com.splayer --platforms android /tmp/fresh
          rm -rf android
          cp -r /tmp/fresh/android .
          # إزالة ملفات Kotlin DSL الافتراضية لمنع التضارب مع ملفاتنا المخصصة
          rm -f android/*.gradle.kts android/app/*.gradle.kts

      - name: Inject Clean & Stable Gradle/Kotlin Configurations
        run: |
          echo "🔧 Injecting root settings.gradle..."
          cat > android/settings.gradle << 'EOF'
          pluginManagement {
              def flutterSdkPath = {
                  def properties = new Properties()
                  def file = new File(settingsDir, "local.properties")
                  if (file.exists()) {
                      properties.load(file.newDataInputStream())
                  }
                  def sdkPath = properties.getProperty("flutter.sdk")
                  if (sdkPath == null) {
                      sdkPath = System.getenv("FLUTTER_ROOT")
                  }
                  if (sdkPath == null) {
                      throw new GradleException("Flutter SDK not found.")
                  }
                  return sdkPath
              }()
              includeBuild("$flutterSdkPath/packages/flutter_tools/gradle")
          }
          plugins {
              id "com.android.application" version "8.2.1" apply false
              id "org.jetbrains.kotlin.android" version "1.9.24" apply false
              id "dev.flutter.flutter-gradle-plugin" version "1.0.0" apply false
          }
          include ":app"
          EOF

          echo "🔧 Injecting root build.gradle..."
          cat > android/build.gradle << 'EOF'
          allprojects {
              repositories {
                  google()
                  mavenCentral()
              }
          }
          tasks.register("clean", Delete) {
              delete rootProject.buildDir
          }
          EOF

          echo "🔧 Upgrading Gradle wrapper to 8.5..."
          sed -i 's|distributionUrl=.*|distributionUrl=https\\://services.gradle.org/distributions/gradle-8.5-all.zip|' android/gradle/wrapper/gradle-wrapper.properties

      - name: Apply custom MainActivity (with PiP Support)
        run: |
          mkdir -p android/app/src/main/kotlin/com/splayer/app
          cat > android/app/src/main/kotlin/com/splayer/app/MainActivity.kt << 'KT'
          package com.splayer.app
          import android.app.PictureInPictureParams
          import android.os.Build
          import android.util.Rational
          import io.flutter.embedding.android.FlutterActivity
          import io.flutter.embedding.engine.FlutterEngine
          import io.flutter.plugin.common.MethodChannel
          class MainActivity : FlutterActivity() {
              private val CHANNEL = "com.splayer.app/pip"
              override fun configureFlutterEngine(flutterEngine: FlutterEngine) {
                  super.configureFlutterEngine(flutterEngine)
                  MethodChannel(flutterEngine.dartExecutor.binaryMessenger, CHANNEL)
                      .setMethodCallHandler { call, result ->
                          if (call.method == "enterPip") {
                              if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.O) {
                                  val params = PictureInPictureParams.Builder()
                                      .setAspectRatio(Rational(16, 9)).build()
                                  enterPictureInPictureMode(params)
                              }
                              result.success(null)
                          } else {
                              result.notImplemented()
                          }
                      }
              }
          }
          KT

      - name: Apply custom AndroidManifest
        run: |
          cat > android/app/src/main/AndroidManifest.xml << 'XML'
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" android:maxSdkVersion="32" />
              <uses-permission android:name="android.permission.READ_MEDIA_VIDEO" />
              <uses-permission android:name="android.permission.WAKE_LOCK" />
              <uses-permission android:name="android.permission.INTERNET" />
              <application
                  android:label="S-Player"
                  android:name="${applicationName}"
                  android:icon="@mipmap/ic_launcher"
                  android:requestLegacyExternalStorage="true"
                  android:hardwareAccelerated="true">
                  <activity
                      android:name=".MainActivity"
                      android:exported="true"
                      android:launchMode="singleTop"
                      android:theme="@style/LaunchTheme"
                      android:configChanges="orientation|keyboardHidden|keyboard|screenSize|smallestScreenSize|locale|layoutDirection|fontScale|screenLayout|density|uiMode"
                      android:hardwareAccelerated="true"
                      android:windowSoftInputMode="adjustResize"
                      android:supportsPictureInPicture="true"
                      android:resizeableActivity="true">
                      <meta-data android:name="io.flutter.embedding.android.NormalTheme" android:resource="@style/NormalTheme" />
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                      <intent-filter>
                          <action android:name="android.intent.action.VIEW" />
                          <category android:name="android.intent.category.DEFAULT" />
                          <category android:name="android.intent.category.BROWSABLE" />
                          <data android:mimeType="video/*" />
                      </intent-filter>
                  </activity>
                  <meta-data android:name="flutterEmbedding" android:value="2" />
              </application>
          </manifest>
          XML

      - name: Patch app/build.gradle (Aligned to SDK 34)
        run: |
          cat > android/app/build.gradle << 'GRADLE'
          plugins {
              id "com.android.application"
              id "kotlin-android"
              id "dev.flutter.flutter-gradle-plugin"
          }
          android {
              namespace "com.splayer.app"
              compileSdk 34
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_1_8
                  targetCompatibility JavaVersion.VERSION_1_8
              }
              kotlinOptions {
                  jvmTarget = "1.8"
              }
              sourceSets {
                  main.java.srcDirs += "src/main/kotlin"
              }
              defaultConfig {
                  applicationId "com.splayer.app"
                  minSdk 21
                  targetSdk 34
                  versionCode flutter.versionCode
                  versionName flutter.versionName
              }
              buildTypes {
                  release {
                      signingConfig signingConfigs.debug
                      minifyEnabled false
                      shrinkResources false
                  }
              }
          }
          GRADLE

      - name: Patch gradle.properties
        run: |
          echo "android.useAndroidX=true"    >> android/gradle.properties
          echo "android.enableJetifier=true" >> android/gradle.properties
          echo "org.gradle.jvmargs=-Xmx4G"  >> android/gradle.properties

      - name: Create local.properties
        run: |
          echo "flutter.sdk=$FLUTTER_ROOT"  > android/local.properties
          echo "sdk.dir=$ANDROID_SDK_ROOT" >> android/local.properties

      - name: Install Android SDK 34
        run: |
          echo "y" | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager "platforms;android-34"

      - name: Install dependencies
        run: flutter pub get

      - name: Fix all incompatible plugins
        run: |
          echo "🔧 Fixing flutter.* properties in Groovy build.gradle files..."
          find "$HOME/.pub-cache/hosted/pub.dev/" -maxdepth 3 -type f -name "build.gradle" | while read file; do
            if grep -q 'flutter\.compileSdkVersion\|flutter\.minSdkVersion\|flutter\.targetSdkVersion' "$file"; then
              sed -i 's/flutter\.compileSdkVersion/34/g' "$file"
              sed -i 's/flutter\.minSdkVersion/21/g' "$file"
              sed -i 's/flutter\.targetSdkVersion/34/g' "$file"
              echo "Patched: $file"
            fi
          done

      - name: Analyze code
        run: flutter analyze --no-fatal-infos
        continue-on-error: true

      - name: Build release APK
        run: flutter build apk --release --no-shrink

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: s-player-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

      - name: Get app version
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
        id: version
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: //' | tr -d '[:space:]')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: S-Player v${{ steps.version.outputs.version }}
          body: |
            ## S-Player APK
            Built automatically by GitHub Actions.
            Download app-release.apk and install it on your device.
          files: build/app/outputs/flutter-apk/app-release.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
