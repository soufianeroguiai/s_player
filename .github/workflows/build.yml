name: Build S-Player APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Java ──────────────────────────────────────────────────
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # ── 3. Flutter ───────────────────────────────────────────────
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: stable
          cache: true

      # ── 4. Create fresh Flutter project ──────────────────────────
      - name: Create base Flutter project
        run: |
          flutter create \
            --project-name s_player \
            --org com.splayer \
            --platforms android \
            /tmp/base_project

      # ── 5. Copy our lib + pubspec into base project ───────────────
      - name: Copy source files
        run: |
          # lib و pubspec
          cp -r lib          /tmp/base_project/lib
          cp    pubspec.yaml /tmp/base_project/pubspec.yaml

          # assets لو موجودة
          if [ -d "assets" ]; then
            cp -r assets /tmp/base_project/assets
          fi

      # ── 6. Patch AndroidManifest ──────────────────────────────────
      - name: Patch AndroidManifest.xml
        run: |
          cat > /tmp/base_project/android/app/src/main/AndroidManifest.xml << 'MANIFEST'
          <manifest xmlns:android="http://schemas.android.com/apk/res/android"
              package="com.splayer.app">

            <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE"
                android:maxSdkVersion="32" />
            <uses-permission android:name="android.permission.READ_MEDIA_VIDEO" />
            <uses-permission android:name="android.permission.MANAGE_EXTERNAL_STORAGE" />
            <uses-permission android:name="android.permission.WAKE_LOCK" />
            <uses-permission android:name="android.permission.INTERNET" />

            <application
                android:label="S-Player"
                android:name="${applicationName}"
                android:icon="@mipmap/ic_launcher"
                android:requestLegacyExternalStorage="true"
                android:hardwareAccelerated="true">

              <activity
                  android:name=".MainActivity"
                  android:exported="true"
                  android:launchMode="singleTop"
                  android:theme="@style/LaunchTheme"
                  android:configChanges="orientation|keyboardHidden|keyboard|screenSize|smallestScreenSize|locale|layoutDirection|fontScale|screenLayout|density|uiMode"
                  android:hardwareAccelerated="true"
                  android:windowSoftInputMode="adjustResize"
                  android:supportsPictureInPicture="true">

                <meta-data
                    android:name="io.flutter.embedding.android.NormalTheme"
                    android:resource="@style/NormalTheme" />

                <intent-filter>
                  <action android:name="android.intent.action.MAIN" />
                  <category android:name="android.intent.category.LAUNCHER" />
                </intent-filter>

                <intent-filter>
                  <action android:name="android.intent.action.VIEW" />
                  <category android:name="android.intent.category.DEFAULT" />
                  <category android:name="android.intent.category.BROWSABLE" />
                  <data android:mimeType="video/*" />
                </intent-filter>

              </activity>

              <meta-data
                  android:name="flutterEmbedding"
                  android:value="2" />

            </application>
          </manifest>
          MANIFEST

      # ── 7. Patch build.gradle ─────────────────────────────────────
      - name: Patch app build.gradle
        run: |
          sed -i 's/minSdkVersion flutter.minSdkVersion/minSdkVersion 21/' \
            /tmp/base_project/android/app/build.gradle
          sed -i 's/targetSdkVersion flutter.targetSdkVersion/targetSdkVersion 34/' \
            /tmp/base_project/android/app/build.gradle
          sed -i 's/compileSdkVersion flutter.compileSdkVersion/compileSdkVersion 34/' \
            /tmp/base_project/android/app/build.gradle

      # ── 8. Add gradle.properties ──────────────────────────────────
      - name: Patch gradle.properties
        run: |
          cat >> /tmp/base_project/android/gradle.properties << 'PROPS'
          android.useAndroidX=true
          android.enableJetifier=true
          org.gradle.jvmargs=-Xmx4G -XX:MaxMetaspaceSize=2G
          PROPS

      # ── 9. Install dependencies ───────────────────────────────────
      - name: Install dependencies
        working-directory: /tmp/base_project
        run: flutter pub get

      # ── 10. Analyze ───────────────────────────────────────────────
      - name: Analyze code
        working-directory: /tmp/base_project
        run: flutter analyze --no-fatal-infos
        continue-on-error: true

      # ── 11. Build APK ─────────────────────────────────────────────
      - name: Build release APK
        working-directory: /tmp/base_project
        run: flutter build apk --release --no-shrink

      # ── 12. Upload artifact ───────────────────────────────────────
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: s-player-apk
          path: /tmp/base_project/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

      # ── 13. GitHub Release ────────────────────────────────────────
      - name: Get version
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
        id: version
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: //' | tr -d '[:space:]')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Create Release
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: S-Player v${{ steps.version.outputs.version }}
          body: |
            ## S-Player APK ✅
            تم البناء تلقائياً بواسطة GitHub Actions
            حمّل `app-release.apk` وثبّته على جهازك.
          files: /tmp/base_project/build/app/outputs/flutter-apk/app-release.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
