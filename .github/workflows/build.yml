name: Build SR Player APK (Stable)

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.2"
          channel: stable
          cache: true

      - name: Fix permissions
        run: chmod +x android/gradlew

      - name: Clean project
        run: |
          flutter clean
          rm -rf android/.gradle

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('android/gradle/wrapper/gradle-wrapper.properties', 'android/settings.gradle.kts', 'android/build.gradle.kts', 'android/app/build.gradle.kts') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Read version from pubspec.yaml
        id: version
        run: |
          VER=$(grep '^version:' pubspec.yaml | sed 's/version: //')
          echo "APP_VERSION=$VER" >> $GITHUB_ENV
          echo "📱 App version: $VER"

      - name: Get Flutter dependencies
        run: flutter pub get

      - name: Accept licenses (Android SDK)
        run: |
          yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --licenses || true

      - name: Build APK
        run: flutter build apk --release --no-shrink --android-skip-build-dependency-validation

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: sr-player-apk-v${{ env.APP_VERSION }}
          path: android/app/build/outputs/apk/release/app-release.apk