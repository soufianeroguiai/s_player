name: Build S-Player APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.3'
          channel: stable
          cache: true

      - name: Generate Pristine Android Project
        run: |
          flutter create --project-name s_player --org com.splayer --platforms android /tmp/fresh
          rm -rf android
          cp -r /tmp/fresh/android .

      - name: Patch Gradle Wrapper Engine to 8.5
        run: |
          sed -i 's/gradle-.*-all.zip/gradle-8.5-all.zip/g' android/gradle/wrapper/gradle-wrapper.properties

      - name: Smart Patch Root and App Build Files (Force SDK 36, NDK & Kotlin 2.1.0)
        run: |
          # 1. تحديث إصدار كوتلين والـ AGP بريجكس مرن يدعم كل أنواع الاقتباسات والأقواس
          sed -i -E "s/id\s+['\"]org.jetbrains.kotlin.android['\"]\s+version\s+['\"][^'\"]+['\"]/id 'org.jetbrains.kotlin.android' version '2.1.0'/g" android/settings.gradle
          sed -i -E "s/id\s+['\"]com.android.application['\"]\s+version\s+['\"][^'\"]+['\"]/id 'com.android.application' version '8.3.2'/g" android/settings.gradle

          # 2. دعم الحزم القديمة التي تبحث عن المتغير التقليدي لكوتلين
          echo "ext.kotlin_version = '2.1.0'" >> android/build.gradle

          # 3. تعديل أسطر الـ SDK وحقن الـ NDK المطلوبة مباشرة داخل بلوك android { }
          sed -i 's/compileSdk.*/compileSdk = 36/g' android/app/build.gradle
          sed -i 's/targetSdk.*/targetSdk = 36/g' android/app/build.gradle
          sed -i 's/minSdk.*/minSdk = 21/g' android/app/build.gradle
          sed -i '/android {/a \    ndkVersion = "25.1.8937393"' android/app/build.gradle

      - name: Apply custom MainActivity (with PiP Support)
        run: |
          rm -rf android/app/src/main/kotlin/com/splayer
          mkdir -p android/app/src/main/kotlin/com/splayer/s_player
          cat > android/app/src/main/kotlin/com/splayer/s_player/MainActivity.kt << 'KT'
          package com.splayer.s_player
          import android.app.PictureInPictureParams
          import android.os.Build
          import android.util.Rational
          import io.flutter.embedding.android.FlutterActivity
          import io.flutter.embedding.engine.FlutterEngine
          import io.flutter.plugin.common.MethodChannel
          class MainActivity : FlutterActivity() {
              private val CHANNEL = "com.splayer.app/pip"
              override fun configureFlutterEngine(flutterEngine: FlutterEngine) {
                  super.configureFlutterEngine(flutterEngine)
                  MethodChannel(flutterEngine.dartExecutor.binaryMessenger, CHANNEL)
                      .setMethodCallHandler { call, result ->
                          if (call.method == "enterPip") {
                              if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.O) {
                                  val params = PictureInPictureParams.Builder()
                                      .setAspectRatio(Rational(16, 9)).build()
                                  enterPictureInPictureMode(params)
                              }
                              result.success(null)
                          } else {
                              result.notImplemented()
                          }
                      }
              }
          }
          KT

      - name: Apply custom AndroidManifest
        run: |
          cat > android/app/src/main/AndroidManifest.xml << 'XML'
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" android:maxSdkVersion="32" />
              <uses-permission android:name="android.permission.READ_MEDIA_VIDEO" />
              <uses-permission android:name="android.permission.WAKE_LOCK" />
              <uses-permission android:name="android.permission.INTERNET" />
              <application
                  android:label="S-Player"
                  android:name="${applicationName}"
                  android:icon="@mipmap/ic_launcher"
                  android:requestLegacyExternalStorage="true"
                  android:hardwareAccelerated="true">
                  <activity
                      android:name=".MainActivity"
                      android:exported="true"
                      android:launchMode="singleTop"
                      android:theme="@style/LaunchTheme"
                      android:configChanges="orientation|keyboardHidden|keyboard|screenSize|smallestScreenSize|locale|layoutDirection|fontScale|screenLayout|density|uiMode"
                      android:hardwareAccelerated="true"
                      android:windowSoftInputMode="adjustResize"
                      android:supportsPictureInPicture="true"
                      android:resizeableActivity="true">
                      <meta-data android:name="io.flutter.embedding.android.NormalTheme" android:resource="@style/NormalTheme" />
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                      <intent-filter>
                          <action android:name="android.intent.action.VIEW" />
                          <category android:name="android.intent.category.DEFAULT" />
                          <category android:name="android.intent.category.BROWSABLE" />
                          <data android:mimeType="video/*" />
                      </intent-filter>
                  </activity>
                  <meta-data android:name="flutterEmbedding" android:value="2" />
              </application>
          </manifest>
          XML

      - name: Create local.properties
        run: |
          echo "flutter.sdk=$FLUTTER_ROOT"  > android/local.properties
          echo "sdk.dir=$ANDROID_SDK_ROOT" >> android/local.properties

      - name: Install Android SDK 36 and NDK 25
        run: |
          echo "y" | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager "platforms;android-36" "ndk;25.1.8937393"

      - name: Install dependencies
        run: flutter pub get

      - name: Fix all incompatible plugins (Groovy + Kotlin DSL)
        run: |
          echo "🔧 Patching SDK properties inside pub-cache plugins to SDK 36..."
          find "$HOME/.pub-cache/hosted/pub.dev/" -maxdepth 3 -type f \( -name "build.gradle" -o -name "build.gradle.kts" \) | while read file; do
            if grep -q 'flutter\.compileSdkVersion\|flutter\.minSdkVersion\|flutter\.targetSdkVersion' "$file"; then
              sed -i 's/flutter\.compileSdkVersion/36/g' "$file"
              sed -i 's/flutter\.minSdkVersion/21/g' "$file"
              sed -i 's/flutter\.targetSdkVersion/36/g' "$file"
              echo "Patched: $file"
            fi
          done

      - name: Analyze code
        run: flutter analyze --no-fatal-infos
        continue-on-error: true

      - name: Build release APK
        run: flutter build apk --release --no-shrink

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: s-player-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

      - name: Get app version
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
        id: version
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: //' | tr -d '[:space:]')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: S-Player v${{ steps.version.outputs.version }}
          body: |
            ## S-Player APK
            Built automatically by GitHub Actions.
            Download app-release.apk and install it on your device.
          files: build/app/outputs/flutter-apk/app-release.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
