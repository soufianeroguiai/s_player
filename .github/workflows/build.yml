name: Build S-Player APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: stable
          cache: true

      - name: Generate Android project
        run: |
          flutter create --project-name s_player --org com.splayer --platforms android /tmp/fresh
          rm -rf android
          cp -r /tmp/fresh/android .

      # ====== تحديث Android Gradle Plugin و Gradle ======
      - name: Upgrade Android Gradle Plugin and Gradle
        run: |
          echo "🔧 Upgrading Android Gradle Plugin to 8.1.0..."
          # في ملف build.gradle (الجذر) – buildscript classpath
          sed -i "s/classpath 'com.android.tools.build:gradle:[^']*'/classpath 'com.android.tools.build:gradle:8.1.0'/" android/build.gradle
          # في settings.gradle – المكونات الإضافية (plugins)
          sed -i 's/id "com.android.application" version "[^"]*"/id "com.android.application" version "8.1.0"/' android/settings.gradle
          sed -i 's/id "com.android.library" version "[^"]*"/id "com.android.library" version "8.1.0"/' android/settings.gradle
          echo "AGP updated."
          
          echo "🔧 Upgrading Gradle wrapper to 8.3..."
          sed -i 's|distributionUrl=.*|distributionUrl=https\\://services.gradle.org/distributions/gradle-8.3-all.zip|' android/gradle/wrapper/gradle-wrapper.properties
          echo "Gradle wrapper updated."
      # ================================================

      # ====== ضبط Kotlin إلى 2.2.0 ======
      - name: Upgrade Kotlin to 2.2.0
        run: |
          echo "🔧 Upgrading Kotlin version to 2.2.0..."
          # في settings.gradle
          sed -i 's/id "org.jetbrains.kotlin.android" version "[^"]*"/id "org.jetbrains.kotlin.android" version "2.2.0"/' android/settings.gradle
          # في build.gradle (للمشاريع القديمة)
          sed -i "s/ext.kotlin_version = '.*'/ext.kotlin_version = '2.2.0'/" android/build.gradle
          echo "Kotlin updated successfully."
      # =================================

      - name: Apply custom MainActivity
        run: |
          mkdir -p android/app/src/main/kotlin/com/splayer/app
          cat > android/app/src/main/kotlin/com/splayer/app/MainActivity.kt << 'KT'
          package com.splayer.app
          import android.app.PictureInPictureParams
          import android.os.Build
          import android.util.Rational
          import io.flutter.embedding.android.FlutterActivity
          import io.flutter.embedding.engine.FlutterEngine
          import io.flutter.plugin.common.MethodChannel
          class MainActivity : FlutterActivity() {
              private val CHANNEL = "com.splayer.app/pip"
              override fun configureFlutterEngine(flutterEngine: FlutterEngine) {
                  super.configureFlutterEngine(flutterEngine)
                  MethodChannel(flutterEngine.dartExecutor.binaryMessenger, CHANNEL)
                      .setMethodCallHandler { call, result ->
                          if (call.method == "enterPip") {
                              if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.O) {
                                  val params = PictureInPictureParams.Builder()
                                      .setAspectRatio(Rational(16, 9)).build()
                                  enterPictureInPictureMode(params)
                              }
                              result.success(null)
                          } else {
                              result.notImplemented()
                          }
                      }
              }
          }
          KT

      - name: Apply custom AndroidManifest
        run: |
          cat > android/app/src/main/AndroidManifest.xml << 'XML'
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" android:maxSdkVersion="32" />
              <uses-permission android:name="android.permission.READ_MEDIA_VIDEO" />
              <uses-permission android:name="android.permission.WAKE_LOCK" />
              <uses-permission android:name="android.permission.INTERNET" />
              <application
                  android:label="S-Player"
                  android:name="${applicationName}"
                  android:icon="@mipmap/ic_launcher"
                  android:requestLegacyExternalStorage="true"
                  android:hardwareAccelerated="true">
                  <activity
                      android:name=".MainActivity"
                      android:exported="true"
                      android:launchMode="singleTop"
                      android:theme="@style/LaunchTheme"
                      android:configChanges="orientation|keyboardHidden|keyboard|screenSize|smallestScreenSize|locale|layoutDirection|fontScale|screenLayout|density|uiMode"
                      android:hardwareAccelerated="true"
                      android:windowSoftInputMode="adjustResize"
                      android:supportsPictureInPicture="true"
                      android:resizeableActivity="true">
                      <meta-data android:name="io.flutter.embedding.android.NormalTheme" android:resource="@style/NormalTheme" />
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                      <intent-filter>
                          <action android:name="android.intent.action.VIEW" />
                          <category android:name="android.intent.category.DEFAULT" />
                          <category android:name="android.intent.category.BROWSABLE" />
                          <data android:mimeType="video/*" />
                      </intent-filter>
                  </activity>
                  <meta-data android:name="flutterEmbedding" android:value="2" />
              </application>
          </manifest>
          XML

      - name: Patch app/build.gradle
        run: |
          cat > android/app/build.gradle << 'GRADLE'
          plugins {
              id "com.android.application"
              id "kotlin-android"
              id "dev.flutter.flutter-gradle-plugin"
          }
          android {
              namespace "com.splayer.app"
              compileSdk 36
              ndkVersion "26.1.10909125"
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_1_8
                  targetCompatibility JavaVersion.VERSION_1_8
              }
              kotlinOptions {
                  jvmTarget = "1.8"
              }
              sourceSets {
                  main.java.srcDirs += "src/main/kotlin"
              }
              defaultConfig {
                  applicationId "com.splayer.app"
                  minSdk 21
                  targetSdk 36
                  versionCode flutter.versionCode
                  versionName flutter.versionName
              }
              buildTypes {
                  release {
                      signingConfig signingConfigs.debug
                      minifyEnabled false
                      shrinkResources false
                  }
              }
          }
          flutter {
              source "../.."
          }
          GRADLE

      - name: Patch gradle.properties
        run: |
          echo "android.useAndroidX=true"    >> android/gradle.properties
          echo "android.enableJetifier=true" >> android/gradle.properties
          echo "org.gradle.jvmargs=-Xmx4G"  >> android/gradle.properties

      - name: Create local.properties
        run: |
          echo "flutter.sdk=$FLUTTER_ROOT"  > android/local.properties
          echo "sdk.dir=$ANDROID_SDK_ROOT" >> android/local.properties

      - name: Install NDK 26
        run: |
          echo "y" | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager "ndk;26.1.10909125"

      - name: Install Android SDK 36
        run: |
          echo "y" | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager "platforms;android-36"

      - name: Install dependencies
        run: flutter pub get

      # ========== إصلاح جميع الإضافات غير المتوافقة ==========
      - name: Fix all incompatible plugins
        run: |
          echo "🔧 Fixing flutter.* properties in Groovy build.gradle files..."
          find "$HOME/.pub-cache/hosted/pub.dev/" -maxdepth 3 -type f -name "build.gradle" | while read file; do
            if grep -q 'flutter\.compileSdkVersion\|flutter\.minSdkVersion\|flutter\.targetSdkVersion' "$file"; then
              sed -i 's/flutter\.compileSdkVersion/34/g' "$file"
              sed -i 's/flutter\.minSdkVersion/21/g' "$file"
              sed -i 's/flutter\.targetSdkVersion/34/g' "$file"
              echo "Patched: $file"
            fi
          done
          
          echo "🔧 Fixing Kotlin DSL build.gradle.kts files with jvmTarget issue..."
          find "$HOME/.pub-cache/hosted/pub.dev/" -maxdepth 3 -type f -name "build.gradle.kts" | while read file; do
            if grep -q '^\s*jvmTarget\s*=' "$file"; then
              if echo "$file" | grep -q "screen_brightness_android"; then
                cat > "$file" << 'KTS'
          plugins {
              id("com.android.library")
              id("kotlin-android")
          }
          android {
              namespace = "com.example.screen_brightness_android"
              compileSdk = 34
              defaultConfig {
                  minSdk = 21
                  targetSdk = 34
              }
              compileOptions {
                  sourceCompatibility = JavaVersion.VERSION_1_8
                  targetCompatibility = JavaVersion.VERSION_1_8
              }
          }
          dependencies {
              implementation("androidx.core:core-ktx:1.9.0")
          }
          KTS
                echo "Replaced screen_brightness_android build.gradle.kts"
              else
                sed -i 's/^\s*jvmTarget\s*=.*/    compilerOptions { jvmTarget.set(JvmTarget.JVM_1_8) }/g' "$file"
                echo "Fixed jvmTarget in: $file"
              fi
            fi
          done
          
          echo "✅ All incompatible plugins have been patched."
      # =============================================================

      - name: Analyze code
        run: flutter analyze --no-fatal-infos
        continue-on-error: true

      - name: Build release APK
        run: flutter build apk --release --no-shrink

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: s-player-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

      - name: Get app version
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
        id: version
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: //' | tr -d '[:space:]')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: S-Player v${{ steps.version.outputs.version }}
          body: |
            ## S-Player APK
            Built automatically by GitHub Actions.
            Download app-release.apk and install it on your device.
          files: build/app/outputs/flutter-apk/app-release.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}