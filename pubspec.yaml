name: sr_player
description: SR Player - Advanced Video Player
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # 🎬 Stable Video Stack
  media_kit: ^1.2.6
  media_kit_video: ^2.0.1
  media_kit_libs_video: ^1.0.7

  # 📁 File & Media
  file_picker: ^12.0.0-beta.5
  photo_manager: ^3.9.0
  path_provider: ^2.1.6

  # 🔐 Permissions
  permission_handler: ^12.0.3

  # 📦 State
  provider: ^6.1.5+1
  shared_preferences: ^2.5.5

  # 🎨 UI
  material_symbols_icons: ^4.2951.0

  # ⚙️ Utilities
  share_plus: ^13.1.0
  wakelock_plus: ^1.6.1
  volume_controller: ^3.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/